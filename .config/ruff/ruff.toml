target-version = "py314"
line-length = 88
indent-width = 4

[lint]
select = ["E", "F", "W", "I", "B", "ANN", "T20"]
ignore = ["F841", "B008", "ANN201", "I001", "ANN204", "F401", "ANN001"]
fixable = ["ALL"]
unfixable = []

[lint.per-file-ignores]
"__init__.py" = ["F401"]
"tests/*" = ["S101", "T201", "ANN"]
