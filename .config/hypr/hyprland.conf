monitor = HDMI-A-1,1920x1080@144,0x0,1
monitor = eDP-1,1920x1080@60,0x1080,1 

# exec-once = waybar
exec-once = dunst -config <(envsubst < ~/.config/dunst/dunstrc)
exec-once = hypridle 
exec-once = hyprpaper
# exec-once = wl-paste --watch cliphist store # working

exec-once = clipse -listen
exec-once = wl-clip-persist --clipboard both
exec-once = wl-copy ""
# windowrulev2 = float, class:(clipse)
# windowrulev2 = size 622 652, class:(clipse)
# windowrulev2 = stayfocused, class:(clipse)

windowrule = float on, match:class (clipse)
windowrule = size 622 652, match:class (clipse)
windowrule = center on, match:class (clipse)

# exec-once = setxkbmap -option caps:escape # for mapping caps -> escape in x11 apps
# exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = systemctl --user start hyprpolkitagent
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = xsettingsd

exec-once = fcitx5 -d

# exec-once = hyprpm reload -n # hyprpm plugins enable
# exec-once = hyprctl setcursor MacOS-Tahoe-Cursor 24
exec-once = hyprctl setcursor Yaru 24
exec-once = xhost +SI:localuser:root # for using applications like: gparted, grub-customizer, ...

exec-once = ~/.local/scripts/import-env

# Coloring
exec = gsettings set org.gnome.desktop.interface color-scheme "prefer-dark" # for GTK4 apps
#for gtk3 apps you need to install adw-gtk3 theme (in arch linux sudo pacman -S adw-gtk-theme)
exec = gsettings set org.gnome.desktop.interface gtk-theme "adw-gtk3-dark" # for GTK3 apps
#for kde apps you need to install: sudo pacman -S qt5ct qt6ct kvantum kvantum breeze-icons   
#you will need to set dark theme for qt apps from kde more difficult thans with gnome :D:

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

env = QT_QPA_PLATFORM,wayland;xcb
env = QT_QPA_PLATFORMTHEME,qt6ct
env = XWAYLAND,1
env = GDK_DPI_SCALE,1
env = GDK_SCALE,1

$terminal = ghostty
$fileManager = nautilus
$menu = tofi-drun --drun-launch=true

input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_rules =
    kb_options=caps:escape
    follow_mouse = 1
    mouse_refocus = false
    float_switch_override_focus = 1
    repeat_rate= 45
    repeat_delay= 300
    touchpad {
        scroll_factor = 0.1
        natural_scroll = yes
        tap-to-click = true
        disable_while_typing = true
        drag_lock = true
    }
}

device {
    name = logitech-g102-lightsync-gaming-mouse
    sensitivity = -0.24
    accel_profile = flat
}

device {
    name = elan050b:01-04f3:312b-touchpad
    sensitivity = 0.3
    natural_scroll = true
    accel_profile = adaptive
}


general {
    gaps_in = 2 #5
    gaps_out = 0 #20
    border_size = 1
    gaps_workspaces = 0
    col.active_border = rgba(ffffff44) 
    col.inactive_border = rgba(ffffff11)
    layout = dwindle
    # cursor_inactive_timeout = 5
    allow_tearing = false
}

decoration {
    dim_inactive = true
    dim_strength = 0.15
    # layerrule = blur, waybar
    active_opacity = 1.0
    fullscreen_opacity = 1.0
    inactive_opacity = 1.0
    rounding = 12 #10
    blur { 
        enabled = false #true
    }
    shadow {
        enabled = true
        range = 20
        render_power = 3
        color = rgba(00000066)
        color_inactive = rgba(00000022)
    }
}

# -----------------------------------------------------
# Animation
# -----------------------------------------------------
animations {
    enabled = false
    bezier = linear, 1, 1, 1, 1
    bezier = md3_standard, 0.2, 0, 0, 1
    bezier = md3_decel, 0.05, 0.5, 0.1, 1
    bezier = md3_accel, 0.3, 0, 0.5, 0.15
    bezier = overshot, 0.05, 0.9, 0.1, 1.1
    bezier = crazyshot, 0.1, 1.5, 0.5, 0.92 
    bezier = hyprnostretch, 0.05, 0.5, 0.1, 1.0
    bezier = fluent_decel, 0.1, 0.5, 0, 1
    bezier = easeInOutCirc, 0.85, 0, 0.15, 1
    bezier = easeOutCirc, 0, 0.2, 0.45, 1
    bezier = easeOutExpo, 0.16, 0.5, 0.3, 1
    animation = windows, 1, 1.5, md3_decel, popin 60%
    animation = border, 1, 3.5, default
    animation = fade, 1, 1.5, md3_decel
    animation = workspaces, 1, 2.0, easeOutExpo, slide
    animation = specialWorkspace, 1, 1.5, md3_decel, slidevert
}

scrolling {
    fullscreen_on_one_column = true
    column_width = 0.8
    direction = down
}

dwindle {
    pseudotile = yes # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = yes # you probably want this
}

master {
    # new_is_master = true
}

gestures {
    # workspace_swipe = off
}

misc {
    vfr = true
    force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
    mouse_move_enables_dpms=true
    key_press_enables_dpms=true
    disable_hyprland_logo = true
}


group {
    auto_group = true
    group_on_movetoworkspace = true
    col.border_active = rgba(00000000)
    col.border_inactive = rgba(00000000)
    groupbar {
        enabled = true
        font_family = SF Pro Display, JetBrainsMono Nerd Font
        font_weight_active = semibold
        font_weight_inactive = medium
        font_size = 12
        scrolling = false
        stacked = false
        indicator_height = 14
        indicator_gap = -14
        height = 14
        gaps_in = 0
        gaps_out = 0
        keep_upper_gap = false
        col.inactive = rgb(000000)
        col.active = rgb(4B2E2B)
        text_color = rgb(ffffff)
        text_color_inactive = rgb(ffffff)
        gradient_rounding = 0
    }
}

windowrule = content none, match:class mpv

windowrule {
    name = smart-borders-and-rounding
    match:float = 0
    match:workspace = w[tv1]
    border_size = 0
    rounding = 0
}
windowrule {
    name = auto-float-common-titles
    match:title = ^(Welcome to.*|Sign in.*|Open File|Save File|Preferences|Settings|Confirm.*|Warning.*)$
    size = 1200 800
    float = true
    center = true
}
windowrule {
    name = auto-float-dialogs
    match:title = (?i).*(file|directory|folder|open|save|preferences|settings|welcome).*
    float = true
    size = 1200 800
    center = true
}
windowrule {
    name = auto-float-system-tools
    match:class = ^(xdg-desktop-portal.*|polkit-kde-authentication-agent-1)$
    float = true
    center = true
}
windowrule {
    name = auto-float-system-tools
    match:class = ^(xdg-desktop-portal-gtk|org.gnome.SystemMonitor)$
    float = true
    size = 1200 800
    center = true
}
windowrule {
    name = brave-google-signin
    match:initial_title = ^(Untitled - Brave)$
    match:class = brave-browser
    float = true
    size = 1200 800
    center = true
}

windowrule {
    name = helium-google-signin
    match:initial_title = ^(Untitled - Helium)$
    match:class = helium
    float = true
    size = 1200 800
    center = true
}

windowrule = float on, match:class hyprland-share-picker, match:title (?i).*?(Select what to share)s?.*
windowrule = center on, match:class hyprland-share-picker, match:title (?i).*?(Select what to share)s?.*
windowrule = size 600 350, match:class hyprland-share-picker, match:title (?i).*?(Select what to share)s?.*

windowrule = float on, match:title (?i).*?(meet.google.com is sharing your screen.)s?.*
windowrule = move 0 1000, match:title (?i).*?(meet.google.com is sharing your screen.)s?.*

windowrule = float on, match:class org.qbittorrent.qBittorrent
windowrule = size 1200 800, match:class org.qbittorrent.qBittorrent
windowrule = center on, match:class (.*?), match:class org.qbittorrent.qBittorrent

# open screenshot edit tool (satty) in float mode
windowrule = float on, match:class com.gabm.satty
windowrule = size 1000 900, match:class com.gabm.satty
windowrule = center on, match:class com.gabm.satty

windowrule = float on, match:class Motrix
windowrule = center on, match:class Motrix

# File Pickers (Thunar, Nautilus)
windowrule = float on, match:class thunar|org.gnome.Nautilus
windowrule = size 900 1000, match:class thunar|org.gnome.Nautilus
windowrule = move 10 25, match:class thunar|org.gnome.Nautilus

# Emulator
windowrule = float on, match:class ^(Emulator)$, match:title ^(Emulator)$

windowrule {
    name = xwayland-video-bridge-fixes
    match:class = xwaylandvideobridge

    no_initial_focus = true
    no_focus = true
    no_anim = true
    no_blur = true
    max_size = 1 1
    opacity = 0.0
}

$mainMod = SUPER
# Switch windows in groups
bind = $mainMod SHIFT, E, changegroupactive, f
bind = $mainMod SHIFT, Q, changegroupactive, b

bind = $mainMod, Q, exec, $terminal
bind = ALT, C, killactive, 
bind = $mainMod, M, exit,
bind = $mainMod, O, exec, $HOME/.local/scripts/hyprland-lock.sh
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating 
bind = ALT, SPACE, exec, $menu
bind = $mainMod, T, togglegroup
bind = $mainMod, SPACE, exec, wofi --show drun

bind = $mainMod, P, exec, hyprpicker -a
bind = $mainMod, C, exec, alacritty --class clipse -e clipse
bind = $mainMod, J, togglesplit,
bind = $mainMod, F, fullscreen
bind = $mainMod, B, exec, killall -9 waybar || waybar

bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d
bind = $mainMod, TAB, workspace, previous

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Screen backlight
bind = , XF86MonBrightnessUp, exec, brightnessctl s +5%
bind = , XF86MonBrightnessDown, exec, brightnessctl s 5%-

# Volume
bind = , xf86audioraisevolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +2%
bind = , xf86audiolowervolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -2%
bind =, XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# Move active window to a workspace with mainMod + SHIFT + [0-9]
# bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1
# bind = $mainMod SHIFT, 2, movetoworkspacesilent, 2
# bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3
# bind = $mainMod SHIFT, 4, movetoworkspacesilent, 4
# bind = $mainMod SHIFT, 5, movetoworkspacesilent, 5
# bind = $mainMod SHIFT, 6, movetoworkspacesilent, 6
# bind = $mainMod SHIFT, 7, movetoworkspacesilent, 7
# bind = $mainMod SHIFT, 8, movetoworkspacesilent, 8
# bind = $mainMod SHIFT, 9, movetoworkspacesilent, 9
# bind = $mainMod SHIFT, 0, movetoworkspacesilent, 10

bind = $mainMod SHIFT, 1, exec, hyprctl dispatch moveoutofgroup && hyprctl dispatch movetoworkspacesilent 1
bind = $mainMod SHIFT, 2, exec, hyprctl dispatch moveoutofgroup && hyprctl dispatch movetoworkspacesilent 2
bind = $mainMod SHIFT, 3, exec, hyprctl dispatch moveoutofgroup && hyprctl dispatch movetoworkspacesilent 3
bind = $mainMod SHIFT, 4, exec, hyprctl dispatch moveoutofgroup && hyprctl dispatch movetoworkspacesilent 4
bind = $mainMod SHIFT, 5, exec, hyprctl dispatch moveoutofgroup && hyprctl dispatch movetoworkspacesilent 5
bind = $mainMod SHIFT, 6, exec, hyprctl dispatch moveoutofgroup && hyprctl dispatch movetoworkspacesilent 6
bind = $mainMod SHIFT, 7, exec, hyprctl dispatch moveoutofgroup && hyprctl dispatch movetoworkspacesilent 7
bind = $mainMod SHIFT, 8, exec, hyprctl dispatch moveoutofgroup && hyprctl dispatch movetoworkspacesilent 8
bind = $mainMod SHIFT, 9, exec, hyprctl dispatch moveoutofgroup && hyprctl dispatch movetoworkspacesilent 9
bind = $mainMod SHIFT, 0, exec, hyprctl dispatch moveoutofgroup && hyprctl dispatch movetoworkspacesilent 10

bind = $mainMod SHIFT CTRL, 1, movetoworkspacesilent, 1
bind = $mainMod SHIFT CTRL, 2, movetoworkspacesilent, 2
bind = $mainMod SHIFT CTRL, 3, movetoworkspacesilent, 3
bind = $mainMod SHIFT CTRL, 4, movetoworkspacesilent, 4
bind = $mainMod SHIFT CTRL, 5, movetoworkspacesilent, 5
bind = $mainMod SHIFT CTRL, 6, movetoworkspacesilent, 6
bind = $mainMod SHIFT CTRL, 7, movetoworkspacesilent, 7
bind = $mainMod SHIFT CTRL, 8, movetoworkspacesilent, 8
bind = $mainMod SHIFT CTRL, 9, movetoworkspacesilent, 9
bind = $mainMod SHIFT CTRL, 0, movetoworkspacesilent, 10

# Example special workspace (scratchpad)
# bind = $mainMod, S, togglespecialworkspace, magic
# bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
# bind = $mainMod, mouse_down, workspace, e+1
# bind = $mainMod, mouse_up, workspace, e-1

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
bind = $mainMod ALT, l, resizeactive, 40 0
bind = $mainMod ALT, h, resizeactive, -40 0
bind = $mainMod ALT, k, resizeactive, 0 -40
bind = $mainMod ALT, j, resizeactive, 0 40

bind = SUPER SHIFT, H, movewindow, l
bind = SUPER SHIFT, L, movewindow, r
bind = SUPER SHIFT, K, movewindow, u
bind = SUPER SHIFT, J, movewindow, d

bind = , PRINT, exec, grimblast --freeze save area - | satty --filename - --output-filename $HOME/Downloads/Screenshot-$(date '+%Y-%m-%d-%H%M%S').png --copy-command wl-copy --early-exit --initial-tool brush
bind = SUPER SHIFT, S, exec, grimblast --freeze save area - | satty --filename - --output-filename $HOME/Downloads/Screenshot-$(date '+%Y-%m-%d-%H%M%S').png --copy-command wl-copy --early-exit --initial-tool brush 
bind = $mainMod, PRINT, exec, grimblast --freeze copy area

# Toggle laptop screen
bind = $mainMod, G, exec, $HOME/.local/scripts/hyprland-monitor-toggle.sh

# Suspend when close lid
bindl= , switch:Lid Switch, exec, systemctl suspend && hyprlock
