general {
    # Gọi trực tiếp hyprlock. pidof để kiểm tra xem nó có đang chạy chưa, tránh việc mở 2-3 lớp lock cùng lúc
    lock_cmd = pidof hyprlock || hyprlock       
    
    # Khóa màn hình TRƯỚC KHI máy tính rơi vào trạng thái suspend
    before_sleep_cmd = loginctl lock-session    
    
    # Bật lại màn hình sau khi máy tính thức dậy từ suspend
    after_sleep_cmd = hyprctl dispatch dpms on  
}

listener {
    timeout = 600                                 
    on-timeout = loginctl lock-session            
}

listener {
    timeout = 630                                 
    on-timeout = hyprctl dispatch dpms off        
    on-resume = hyprctl dispatch dpms on          
}

listener {
    timeout = 2700
    on-timeout = systemctl suspend                
}
